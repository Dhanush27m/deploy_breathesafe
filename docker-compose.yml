# ── BreatheSafe — Production Docker Compose ─────────────────────────────────
# Local dev:   docker-compose up --build
# Production:  deploy via Railway / any Docker host
#
# Ports (local):  DB=5434  Backend=8001  Frontend=5174

services:

  db:
    image: postgres:16-alpine
    container_name: breathesafe_deploy_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-breathesafe_deploy}
      POSTGRES_USER:     ${POSTGRES_USER:-breathesafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_deploy:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-breathesafe} -d ${POSTGRES_DB:-breathesafe_deploy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breathesafe_deploy_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:                ${DATABASE_URL}
      DEBUG:                       ${DEBUG:-false}
      SECRET_KEY:                  ${SECRET_KEY}
      JWT_ALGORITHM:               ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      REFRESH_TOKEN_EXPIRE_DAYS:   ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      SMTP_HOST:                   ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:                   ${SMTP_PORT:-587}
      SMTP_USER:                   ${SMTP_USER}
      SMTP_PASSWORD:               ${SMTP_PASSWORD}
      EMAIL_FROM:                  ${EMAIL_FROM}
      AQI_FETCH_INTERVAL_MINUTES:  ${AQI_FETCH_INTERVAL_MINUTES:-60}
      ALERT_CHECK_INTERVAL_MINUTES: ${ALERT_CHECK_INTERVAL_MINUTES:-30}
      ALLOWED_ORIGINS:             ${ALLOWED_ORIGINS:-'["http://localhost:3000","http://localhost:5174","http://127.0.0.1:5174"]'}
      OPENAQ_API_KEY:              ${OPENAQ_API_KEY:-}
      OPENWEATHER_API_KEY:         ${OPENWEATHER_API_KEY:-}
    volumes:
      - ml_models_deploy:/app/ml/models
      - ./data:/app/data
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001
    container_name: breathesafe_deploy_frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data_deploy:
  ml_models_deploy:
